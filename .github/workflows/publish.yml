name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: bun run cli:build

      - name: Verify CLI
        run: node bin/buner.js --version

      - name: Publish (dry run)
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: npm publish --dry-run --provenance --access public

      - name: Publish
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: npm publish --provenance --access public
